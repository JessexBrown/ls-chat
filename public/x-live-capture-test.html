<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>X Live Capture Test</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0b0d11;
        color: #f2f5f8;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(720px, calc(100vw - 28px));
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      h1 {
        margin: 0;
        font-size: 20px;
      }

      button {
        border: 1px solid #323a46;
        border-radius: 7px;
        background: #181d25;
        color: #f2f5f8;
        padding: 8px 10px;
        font-weight: 800;
      }

      .broadcast {
        border: 1px solid #242a34;
        border-radius: 10px;
        overflow: hidden;
        background: #101318;
      }

      .video {
        aspect-ratio: 16 / 9;
        display: grid;
        place-items: center;
        border-bottom: 1px solid #242a34;
        background: linear-gradient(135deg, #111827, #263244);
        color: #aeb6c5;
        font-weight: 800;
      }

      [aria-label="X live chat"] {
        height: 320px;
        overflow: auto;
      }

      [role="listitem"] {
        display: grid;
        grid-template-columns: minmax(88px, 150px) 1fr;
        gap: 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        padding: 8px 10px;
        font-size: 14px;
      }

      .user {
        color: #9cc7ff;
        font-weight: 800;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .message {
        color: #f2f5f8;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Local X Broadcast Fixture</h1>
        <div>
          <button type="button" id="start-capture">Start Capture</button>
          <button type="button" id="add-message">Add Message</button>
        </div>
      </header>

      <section class="broadcast">
        <div class="video">Mock X Live Broadcast</div>
        <div role="list" aria-label="X live chat" id="chat-list"></div>
      </section>
    </main>

    <script>
      const chatList = document.querySelector("#chat-list");
      let counter = 1;

      function addMessage() {
        const row = document.createElement("div");
        row.setAttribute("role", "listitem");
        row.innerHTML = `
          <span class="user">@viewer${counter}</span>
          <span class="message">fixture chat message ${counter}</span>
        `;
        chatList.appendChild(row);
        chatList.scrollTop = chatList.scrollHeight;
        counter += 1;
      }

      for (let index = 0; index < 12; index += 1) {
        addMessage();
      }

      document.querySelector("#add-message").addEventListener("click", addMessage);
      document.querySelector("#start-capture").addEventListener("click", () => {
        window.LS_CHAT_CAPTURE_ENDPOINT = `${window.location.origin}/api/capture/x-live`;
        window.LS_CHAT_CAPTURE_CHANNEL = "Local X Broadcast Fixture";
        const script = document.createElement("script");
        script.src = "/x-live-capture.js";
        document.documentElement.appendChild(script);
      });
    </script>
  </body>
</html>
